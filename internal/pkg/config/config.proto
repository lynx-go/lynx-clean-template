syntax = "proto3";

package lynx.api.config;

option go_package = "github.com/lynx-go/lynx-clean-template/internal/pkg/config";

message AppConfig {
  Server server = 1;
  Data data = 2;
  PubSub pubsub = 3;
  Security security = 4;
  File file = 5;
  App app = 6;
}

message Server {
  Http http = 1;
  GRPC grpc = 2;
  Http ai_gateway = 3;
  GRPC messageloop_grpc = 4;
}

message Security {
  message Jwt {
    string secret = 1;
    int32 token_expiry_sec = 2;
    string refresh_token_secret = 3;
    int32 refresh_token_expiry_sec = 4;
  }
  Jwt jwt = 1;
}

message GRPC {
  string addr = 1;
  string timeout = 2;
}

message Http {

  message Cors {
    repeated string allow_origins = 1;
    repeated string allow_methods = 2;
    repeated string allow_headers = 3;
    repeated string expose_headers = 4;
    bool allow_credentials = 5;
    int32 max_age = 6;
  }

  string addr = 1;
  string timeout = 2;
  Cors cors = 4;
}

message Database {
  message Pool {
    int32 max_idle_conns = 1;
    int32 max_open_conns = 2;
    string conn_max_lifetime = 3;
    string conn_max_idle_time = 4;
  }

  string driver = 1;
  string dialect = 2;
  string source = 3;
  bool debug = 4;
  Pool pool = 5;
}

message Redis {
  string addr = 1;
  string password = 2;
  int32 db = 3;
}

message Data {
  Database database = 1;
  Redis redis = 2;
}

message PubSub {
  map<string, Kafka> kafka = 1;
}

message Kafka {
  message Consumer {
    string group_id = 1;
    int32 start_offset = 2;
    int32 instances = 3;
    bool log_message = 4;
    string mapped_event = 5;
  }

  message Producer {
    int32 acks = 1;
    bool log_message = 2;
    int32 batch_size = 3;
    string batch_timeout = 4;
    string mapped_event = 5;
    bool async = 6;
  }

  repeated string brokers = 1;
  string topic = 2;
  Consumer consumer = 3;
  Producer producer = 4;
}

message File {
  message Bucket {
    string endpoint = 1;
    string bucket_name = 2;
    string access_key_id = 3;
    string access_key_secret = 4;
    string region_name = 5;
    string url = 6;
    string base_path = 7;
    string exposed_url = 10;
    repeated string include_categories = 11;
    map<string, string> file_path_templates = 12;
  }

  map<string, Bucket> buckets = 1;
}

message App {
  User user = 1;
}

message User {
  repeated string default_avatar_urls = 1;
}
