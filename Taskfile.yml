version: '3'
dotenv: ['.env']

tasks:
  install-tools:
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
      - go install -tags 'postgres mysql' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
      - go install github.com/bufbuild/buf/cmd/buf@v1.63.0

  # 生成 config proto 文件
  generate:config:
    dir: '{{.USER_WORKING_DIR}}/internal/pkg/config'
    cmds:
      - protoc -I. --go_out=. --go_opt=paths=source_relative ./config.proto

  # 启动本地开发环境
  up:
    dir: '{{.USER_WORKING_DIR}}/docker/local'
    cmds:
      - docker compose up -d

  # 关闭本地开发环境
  down:
    dir: '{{.USER_WORKING_DIR}}/docker/local'
    cmds:
      - docker compose down

  down:clean:
    dir: '{{.USER_WORKING_DIR}}/docker/local'
    cmds:
      - docker compose down -v

  # 重新生成 protobuf
  generate:proto:
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - buf generate

  # 更新依赖
  upgrade-deps:
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - go get -u github.com/lynx-go/x
      - go get -u github.com/lynx-go/lynx
      - go get -u github.com/lynx-go/lynx/contrib/zap
      - go get -u github.com/lynx-go/lynx/contrib/pubsub
      - go get -u github.com/lynx-go/lynx/contrib/kafka
      - go get -u github.com/lynx-go/lynx/contrib/schedule
      - go mod tidy

  # 更新本地数据库表结构
  migrate:
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - migrate -path ./db/migrations -database postgres://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB?sslmode=disable up

  # wire 生成
  wire-server:
    dir: '{{.USER_WORKING_DIR}}/cmd/server'
    cmds:
      - go mod tidy
      - go run -mod=mod github.com/google/wire/cmd/wire

  wire-cli:
    dir: '{{.USER_WORKING_DIR}}/cmd/cli/cmd'
    cmds:
      - go mod tidy
      - go run -mod=mod github.com/google/wire/cmd/wire

  wire-tests:
    dir: '{{.USER_WORKING_DIR}}/tests'
    cmds:
      - go mod tidy
      - go run -mod=mod github.com/google/wire/cmd/wire

  wire:
    cmds:
      - task: wire-server
      - task: wire-cli
      - task: wire-tests

  create-super-admin:
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - go run ./cmd/cli create-user -u admin -e admin@admin.com -p 11111111 --admin

  gen-api-key:
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - go run ./cmd/cli gen-api-key -f

  generate:
    cmds:
      - task: generate:proto
      - task: generate:config
      - task: wire

  install:
    cmds:
      - task: migrate

  dev:
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - go run ./cmd/server

  # Build server binary
  build:
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - go build -ldflags "-X main.Version={{.VERSION}}" -o ./bin/ ./cmd/server
    vars:
      VERSION:
        sh: git describe --tags --always

  # Build CLI binary
  build-cli:
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - go build -ldflags "-X main.Version={{.VERSION}}" -o ./bin/lynx ./cmd/cli
    vars:
      VERSION:
        sh: git describe --tags --always

  # Build all binaries
  build-all:
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: build
      - task: build-cli

  # Run tests with coverage
  test:
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - go test -v ./... -cover

  # Build Docker image
  build-docker:
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - docker build -t {{.DOCKER_IMAGE}} .
      - docker push {{.DOCKER_IMAGE}}
    vars:
      GIT_VERSION:
        sh: git describe --tags --always
      VERSION: 1.0.0
      TIMESTAMP:
        sh: '{{if eq .OS "Windows_NT"}}powershell -NoProfile -Command Get-Date -Format "yyyyMMddHHmmss"{{else}}date +%Y%m%d%H%M%S{{end}}'
      DOCKER_IMAGE: 'lynx:{{.VERSION}}-{{.GIT_VERSION}}-{{.TIMESTAMP}}'
