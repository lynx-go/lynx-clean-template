syntax = "proto3";

package lynx.api.v1;

option go_package = "github.com/lynx-go/lynx-clean-template/genproto/api/v1;apipb";

import "shared/user.proto";
import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";

// UsersService provides operations for the authenticated user to manage their own profile.
service UsersService {
  // UpdateMyProfile updates the authenticated user's profile
  // buf:lint:ignore RPC_REQUEST_RESPONSE_UNIQUE
  rpc UpdateMyProfile(UpdateMyProfileRequest) returns (UserProfile) {
    option (google.api.http) = {
      patch: "/v1/users/-/profile"
      body: "user"
    };
  }

  // GetUserProfile returns a user's profile by ID
  // When user_id is "-", returns the authenticated user's profile
  // buf:lint:ignore RPC_REQUEST_RESPONSE_UNIQUE
  rpc GetUserProfile(GetUserProfileRequest) returns (UserProfile) {
    option (google.api.http) = {
      get: "/v1/users/{user_id}/profile"
    };
  }
}

// User represents a user profile
message UserProfile {
  string id = 1;
  string username = 2;
  string display_name = 3;
  string avatar_url = 4;
  string phone = 5;
  string email = 6;
  int32 gender = 7;
  int32 status = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  google.protobuf.Timestamp last_sign_in_at = 11;
  google.protobuf.Timestamp banned_until = 12;
  bool is_super_admin = 13;

  // Metadata fields
  lynx.shared.UserMetadata user_metadata = 21;
  lynx.shared.AppMetadata app_metadata = 22;
}

// UpdateMyProfileRequest contains the fields to update
message UpdateMyProfileRequest {
  UserProfile user = 1;
  google.protobuf.FieldMask update_mask = 2;
}

// GetUserProfileRequest contains the user ID to query
// When user_id is "-", returns the authenticated user's profile
message GetUserProfileRequest {
  string user_id = 1 [(buf.validate.field).required = true];
}
