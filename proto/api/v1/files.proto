syntax = "proto3";

// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
package skyline.api.v1;

option go_package = "github.com/lynx-go/lynx-clean-template/genproto/api/v1;apipb";

import "google/api/annotations.proto";
//import "google/protobuf/field_mask.proto";
//import "google/protobuf/timestamp.proto";
//import "buf/validate/validate.proto";

service FilesService {
  rpc GetPresignedURL(GetPresignedURLRequest) returns(GetPresignedURLResponse) {
    option (google.api.http) = {
      get: "/v1/files/presigned-urls"
    };
  }
}
message GetPresignedURLRequest {
  string category = 1;
  string mime_type = 2;
  string filename = 3;
  string file_path = 4;
  string file_id = 5;
}

message GetPresignedURLResponse {
  string presigned_url = 1;
  string file_path = 2;
  string exposed_url = 3;
  string file_id = 4;
}

